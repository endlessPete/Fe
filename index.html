<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skylark Fe</title>

<style>
:root {
  --ios-bg: #f2f2f7;
  --card-bg: #ffffff;
  --separator: #d1d1d6;
  --text-primary: #000;
  --text-secondary: #6e6e73;
  --ios-blue: #007aff;
}

* {
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
               "Helvetica Neue", Arial, sans-serif;
}

body {
  margin: 0;
  background: var(--ios-bg);
  color: var(--text-primary);
}

/* Nav bar */
.nav {
  height: 44px;
  display: flex;
  align-items: center;
  padding: 0 14px;
}

.nav a {
  color: var(--ios-blue);
  text-decoration: none;
  font-weight: 500;
}

.nav .title {
  flex: 1;
  text-align: center;
  font-weight: 600;
}

/* Layout */
.container {
  padding: 16px;
}

.card {
  background: var(--card-bg);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 16px;
}

.row {
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.row + .row {
  border-top: 1px solid var(--separator);
}

.row span {
  color: var(--text-secondary);
}

/* Update card */
.update-card {
  padding: 16px;
}

.update-header {
  display: flex;
  gap: 14px;
}

.update-icon {
  width: 60px;
  height: 60px;
  border-radius: 14px;
  background: linear-gradient(135deg, #5ac8fa, #007aff);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  font-weight: 700;
}

.update-title {
  font-size: 18px;
  font-weight: 600;
}

.update-size {
  font-size: 14px;
  color: var(--text-secondary);
}

.update-text {
  margin-top: 12px;
  font-size: 15px;
  line-height: 1.4;
}

.update-text em {
  color: var(--text-secondary);
}

/* Buttons */
.primary-btn {
  margin-top: 16px;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: var(--ios-blue);
  color: white;
  font-size: 17px;
  font-weight: 600;
}

.secondary-btn {
  margin-top: 10px;
  text-align: center;
  color: var(--ios-blue);
  font-size: 16px;
  cursor: pointer;
}

.footer-note {
  margin-top: 12px;
  font-size: 13px;
  color: var(--text-secondary);
  text-align: center;
}
</style>
</head>

<body>

<!-- Nav -->
<div class="nav">
  <a href="https://endlesspete.github.io/Undecimus/">Back</a>
  <div class="title">Software Update</div>
  <div style="width:40px;"></div>
</div>

<div class="container">

  <!-- Settings -->
  <div class="card">
    <div class="row">
      <div>Automatic Updates</div>
      <span>Off</span>
    </div>
    <div class="row">
      <div>Beta Updates</div>
      <span>Off</span>
    </div>
  </div>

  <!-- Skylark Fe -->
  <div class="card update-card">
    <div class="update-header">
      <div class="update-icon">Fe</div>
      <div>
        <div class="update-title">Skylark Fe</div>
        <div class="update-size">v1.0</div>
      </div>
    </div>

    <div class="update-text">
      <em>
        <!-- CHANGELOG PLACEHOLDER -->
        initial release of Skylark Fe beta
      </em>
    </div>

    <button class="primary-btn" onclick="handleGet()">
      Get Skylark Fe
    </button>

    <div class="secondary-btn" onclick="handlePrevious()">
      Previous releases
    </div>

    <div class="footer-note">
      Available for iOS and iPadOS devices running iOS 15.0 through 17.7.
    </div>
  </div>

</div>

<script>
function getIOSVersion() {
  const match = navigator.userAgent.match(/OS (\d+)_?(\d+)?/);
  if (!match) return null;
  return parseFloat(match[1] + "." + (match[2] || 0));
}

function isAppleMobile() {
  return /iPhone|iPad|iPod/.test(navigator.userAgent);
}

function allowedDevice() {
  const ios = getIOSVersion();
  if (!isAppleMobile() || ios === null) return false;
  return ios >= 15.0 && ios <= 17.7;
}

function blockMessage() {
  alert(
    "Skylark Fe is only available on iOS and iPadOS devices running iOS 15.0 through 17.7.\n\n" +
    "Your device or software version is not supported."
  );
}

function handleGet() {
  if (!allowedDevice()) {
    blockMessage();
    return;
  }
  // PLACEHOLDER URL
  window.location.href = "https://www.icloud.com/shortcuts/8d6e3f6e141c4f71a95e36cddfa6ce6d";
}

function handlePrevious() {
  if (!allowedDevice()) {
    blockMessage();
    return;
  }
  window.location.href = "previous-releases.html";
}
</script>

</body>
</html>
